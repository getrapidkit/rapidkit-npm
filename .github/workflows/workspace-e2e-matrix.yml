name: Workspace E2E Matrix

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  workspace-matrix:
    name: Workspace Matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Workaround npm optional-deps bug (rollup on Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: npm install --no-save @rollup/rollup-win32-x64-msvc

      - name: Workaround npm optional-deps bug (rollup on macOS arm64)
        if: runner.os == 'macOS'
        shell: bash
        run: npm install --no-save @rollup/rollup-darwin-arm64

      - name: Build
        shell: bash
        run: npm run build

      - name: Workspace lifecycle smoke (cross-OS)
        shell: bash
        run: |
          set -euo pipefail
          TEST_ROOT="$RUNNER_TEMP/rapidkit-ws-matrix"
          rm -rf "$TEST_ROOT"
          mkdir -p "$TEST_ROOT"
          cd "$TEST_ROOT"

          CLI="node $GITHUB_WORKSPACE/dist/index.js"

          $CLI create workspace ws-matrix --yes --profile go-only
          cd ws-matrix

          $CLI bootstrap --profile go-only
          $CLI bootstrap --profile polyglot

          test -f .rapidkit/reports/bootstrap-compliance.latest.json
          echo "✅ workspace matrix smoke passed on $RUNNER_OS"
